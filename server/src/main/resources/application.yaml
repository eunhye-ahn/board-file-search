spring:
  application:
    name: board
  datasource:
    url: jdbc:mysql://localhost:3306/board
    username : ${DB_USERNAME}
    password : ${DB_PASSWORD}
    driver-class-name: com.mysql.jdbc.Driver
  config:
    import: optional:file:.env[.properties]
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none